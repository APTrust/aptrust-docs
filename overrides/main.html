{% extends "base.html" %}

{% block extrahead %}
<!-- Matomo: load tracker only (trackPageView fires via document$ below) -->
<script>
    var _paq = window._paq = window._paq || [];
    _paq.push(['enableLinkTracking']);
    (function () { var u = "//analytics.lib.virginia.edu/"; _paq.push(['setTrackerUrl', u + 'matomo.php']); _paq.push(['setSiteId', '55']); var d = document, g = d.createElement('script'), s = d.getElementsByTagName('script')[0]; g.async = true; g.src = u + 'matomo.js'; s.parentNode.insertBefore(g, s); }
    )();
</script>
<!-- End Matomo Code -->
{% endblock %}

{% block scripts %}
{{ super() }}
<script>
    /* Fire a Matomo page view on every navigation, including instant loading.
       document$ is Material for MkDocs' RxJS observable that emits on each
       page change — it covers both the initial load and all instant navigations. */
    document$.subscribe(function () {
        _paq.push(['setCustomUrl', 'https://docs.aptrust.org/' + window.location.pathname.replace(/^\//, '')]);
        _paq.push(['trackPageView']);
    });
</script>
{% endblock %}
