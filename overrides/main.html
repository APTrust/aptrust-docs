{% extends "base.html" %}

{% block extrahead %}
<!-- Pre-launch: prevent search engine indexing. Remove before public launch. -->
<meta name="robots" content="noindex, nofollow">
<!-- Matomo: load tracker only (trackPageView fires via document$ below) -->
<script>
    var _paq = window._paq = window._paq || [];
    _paq.push(['enableLinkTracking']);
    (function () { var u = "//analytics.lib.virginia.edu/"; _paq.push(['setTrackerUrl', u + 'matomo.php']); _paq.push(['setSiteId', '55']); var d = document, g = d.createElement('script'), s = d.getElementsByTagName('script')[0]; g.async = true; g.src = u + 'matomo.js'; s.parentNode.insertBefore(g, s); }
    )();
</script>
<!-- End Matomo Code -->
{% endblock %}

{% block scripts %}
{{ super() }}
<script>
    /* Fire a Matomo page view on every navigation, including instant loading.
       document$ is Material for MkDocs' RxJS observable that emits on each
       page change — it covers both the initial load and all instant navigations. */
    document$.subscribe(function () {
        /* Matomo: track page view on every navigation */
        _paq.push(['setCustomUrl', 'https://docs.aptrust.org/docs.aptrust.org/' + window.location.pathname.replace(/^\//, '')]);
        _paq.push(['trackPageView']);

        /* WCAG 3.2.2 + general best practice: all external links should open
           in a new tab with accessible indicators. For every external link
           (http/https, not pointing to this site) in the content area:
             1. Set target="_blank" so it opens in a new tab.
             2. Add rel="noopener" (security — prevents window.opener access).
             3. Append a visually-hidden span so screen readers announce
                "opens in new tab" after the link text.
           The CSS a[target="_blank"]::after rule in extra.css then applies
           the ↗ icon automatically for sighted users.
           All three steps run on every page change (instant navigation). */
        /* WCAG 2.4.4 / 2.4.6: icon-only links in the header and page content use
           `title` for tooltips but `aria-label` is announced more reliably by
           screen readers. Copy title → aria-label where aria-label is absent.
           The repo link also gets "on GitHub" appended so its purpose is clear. */
        var repoBtn = document.querySelector('a.md-header__button.md-icon[href*="github.com"]');
        if (repoBtn && !repoBtn.getAttribute('aria-label')) {
            var repoTitle = repoBtn.getAttribute('title') || 'repository';
            repoBtn.setAttribute('aria-label', repoTitle + ' on GitHub');
        }

        document.querySelectorAll('a.md-content__button[title]').forEach(function (btn) {
            if (!btn.getAttribute('aria-label')) {
                btn.setAttribute('aria-label', btn.getAttribute('title'));
            }
        });

        /* WCAG 4.1.2: header icon-button <label> elements need aria-label.
           title is not reliably exposed as an accessible name for interactive
           elements by screen readers. Drawer and search have no title at all.
           Palette labels re-set every navigation because their title flips
           between "Switch to dark mode" and "Switch to light mode". */
        [
            { sel: 'label.md-header__button[for="__drawer"]', fallback: 'Open navigation' },
            { sel: 'label.md-header__button[for="__search"]', fallback: 'Open search'     }
        ].forEach(function (item) {
            var el = document.querySelector(item.sel);
            if (el) el.setAttribute('aria-label', el.getAttribute('title') || item.fallback);
        });
        document.querySelectorAll('label.md-header__button[for^="__palette"]').forEach(function (el) {
            var t = el.getAttribute('title');
            if (t) el.setAttribute('aria-label', t);
        });

        /* WCAG 1.1.1: SVGs inside labeled header controls are decorative — the
           parent label's aria-label is the accessible name. Hide the SVGs so
           screen readers don't announce them as unlabeled images. */
        document.querySelectorAll(
            '.md-header__button svg, .md-search__icon svg'
        ).forEach(function (svg) {
            svg.setAttribute('aria-hidden', 'true');
        });

        /* WCAG 2.1.1: keyboard access for Material's label-based toggles.
           Material for MkDocs uses <label for="__drawer"> and <label for="__nav_*">
           as CSS-only checkbox toggles. Labels are not keyboard-focusable by
           default, so the hamburger menu and sidebar section toggles can't be
           reached or activated without a mouse. The fix: add tabindex/role/keydown
           to each label so keyboard and AT users can operate them. A data attribute
           guards against duplicate listener attachment across instant navigations. */
        function patchLabelToggle(label) {
            if (label.dataset.kbPatched) return;
            label.dataset.kbPatched = '1';
            var cb = document.getElementById(label.getAttribute('for'));
            label.setAttribute('tabindex', '0');
            /* role="button" is not a valid ARIA role on <label> per the ARIA in
               HTML spec — omit it. tabindex + aria-label + keydown preserve full
               keyboard operability without the invalid role. */
            if (cb) {
                /* aria-expanded is not a global ARIA attribute — it is only valid
                   on elements with specific roles (button, combobox, etc.). Since
                   <label> cannot carry a role, aria-expanded is also disallowed.
                   aria-controls IS a global attribute and is safe to keep. */
                var navEl = label.parentElement && (
                    label.parentElement.querySelector(':scope > nav.md-nav') ||
                    label.parentElement.querySelector(':scope > ul.md-nav__list')
                );
                if (navEl) {
                    if (!navEl.id) navEl.id = label.getAttribute('for') + '-content';
                    label.setAttribute('aria-controls', navEl.id);
                }
            }
            label.addEventListener('keydown', function (e) {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    if (cb) cb.click();
                }
            });
        }

        /* Target the header hamburger specifically — querySelector returns the
           md-overlay label first in Material's DOM order, which would attach
           role="button" to a <label>, an invalid ARIA combination. */
        var drawerLabel = document.querySelector('label.md-header__button[for="__drawer"]');
        if (drawerLabel) patchLabelToggle(drawerLabel);

        /* WCAG 2.1.1 / 4.1.2: the overlay backdrop is a separate label[for="__drawer"]
           that closes the drawer when activated. The ARIA in HTML spec does not allow
           any role on <label>, so we add only tabindex + aria-label + keydown — no
           role attribute. */
        var overlay = document.querySelector('label.md-overlay[for="__drawer"]');
        if (overlay && !overlay.dataset.kbPatched) {
            overlay.dataset.kbPatched = '1';
            overlay.setAttribute('tabindex', '0');
            overlay.setAttribute('aria-label', 'Close navigation drawer');
            var overlayCb = document.getElementById('__drawer');
            if (overlayCb) {
                overlay.addEventListener('keydown', function (e) {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        overlayCb.click();
                    }
                });
            }
        }

        document.querySelectorAll('label[for^="__nav_"]').forEach(patchLabelToggle);

        /* WCAG 2.1.1: scrollable nav list regions must be keyboard-reachable.
           Safari will not auto-scroll an overflow container to reveal a focused
           child link unless the container itself has tabindex="0". We re-evaluate
           on every navigation because different pages expand different sections,
           changing which lists actually overflow. Lists that no longer overflow
           have the attribute removed so they don't create spurious tab stops. */
        document.querySelectorAll('.md-nav__list').forEach(function (list) {
            if (list.scrollHeight > list.clientHeight) {
                if (!list.hasAttribute('tabindex')) list.setAttribute('tabindex', '0');
            } else {
                if (list.getAttribute('tabindex') === '0') list.removeAttribute('tabindex');
            }
        });

        /* WCAG 4.1.1: expose the active nav item to assistive technologies.
           Material adds md-nav__link--active but no aria-current; screen readers
           can't determine which page is current without it. Re-run on every
           navigation so the correct item is always marked. */
        document.querySelectorAll('.md-nav__link[aria-current]').forEach(function (l) {
            l.removeAttribute('aria-current');
        });
        document.querySelectorAll('.md-nav__link--active').forEach(function (l) {
            l.setAttribute('aria-current', 'page');
        });

        /* WCAG 1.3.1: nav and TOC section titles are visually styled as headings
           but lack heading semantics. The primary-nav drawer toggle (for="__drawer")
           is excluded because it is an interactive toggle, not a section heading.
           All other .md-nav__title elements — including the TOC title (for="__toc")
           — get role="heading". Any non-navigating <a> inside them (href="#" or no
           href) is suppressed so it doesn't announce as "Clickable" to screen
           readers without sending users anywhere. */
        document.querySelectorAll('.md-nav__title:not([for="__drawer"])').forEach(function (el) {
            if (!el.getAttribute('role')) {
                el.setAttribute('role', 'heading');
                el.setAttribute('aria-level', '2');
            }
            el.querySelectorAll('a[href="#"], a:not([href])').forEach(function (a) {
                a.setAttribute('role', 'presentation');
                a.setAttribute('aria-hidden', 'true');
                a.setAttribute('tabindex', '-1');
            });
        });

        /* WCAG 2.4.3: in mobile view the sidebar is off-screen when the drawer
           is closed — its links must be removed from the tab order so keyboard
           users don't land on invisible content. When the drawer opens, focus is
           moved inside and trapped until the user closes it (matching modal dialog
           behaviour). The IIFE + dataset.trapSetup guard ensures the change and
           resize listeners are attached only once across instant navigations. */
        (function () {
            var drawerCb  = document.getElementById('__drawer');
            var sidebar   = document.querySelector('.md-sidebar--primary');
            var dLabel    = document.querySelector('label[for="__drawer"]');
            if (!drawerCb || !sidebar || drawerCb.dataset.trapSetup) return;
            drawerCb.dataset.trapSetup = '1';

            function isMobile() { return window.innerWidth < 960; }

            function setTabindex(open) {
                sidebar.querySelectorAll('a, button').forEach(function (el) {
                    open ? el.removeAttribute('tabindex') : el.setAttribute('tabindex', '-1');
                });
                sidebar.querySelectorAll('label[data-kb-patched]').forEach(function (l) {
                    l.setAttribute('tabindex', open ? '0' : '-1');
                });
                /* WCAG 1.3.1: also hide the off-screen drawer from VoiceOver and
                   other AT. tabindex="-1" only removes keyboard tab stops — it does
                   not hide content from the screen-reader virtual cursor. aria-hidden
                   suppresses the entire sidebar from AT when it is off-screen on
                   mobile, preventing VoiceOver from announcing invisible content. */
                if (open) {
                    sidebar.removeAttribute('aria-hidden');
                } else {
                    sidebar.setAttribute('aria-hidden', 'true');
                }
            }

            var trapHandler = null;

            function activateTrap() {
                setTabindex(true);
                trapHandler = function (e) {
                    if (e.key !== 'Tab') return;
                    var f = Array.from(sidebar.querySelectorAll(
                        'a:not([tabindex="-1"]), button:not([tabindex="-1"]), label[tabindex="0"]'
                    )).filter(function (el) { return el.offsetParent !== null; });
                    if (!f.length) return;
                    if (e.shiftKey && document.activeElement === f[0]) {
                        e.preventDefault(); f[f.length - 1].focus();
                    } else if (!e.shiftKey && document.activeElement === f[f.length - 1]) {
                        e.preventDefault(); f[0].focus();
                    }
                };
                document.addEventListener('keydown', trapHandler);
                /* Delay initial focus until the CSS slide-in animation finishes
                   (250ms transition). Calling focus() immediately moves focus to
                   an element that is still off-screen (left:-12.1rem + translateX
                   animating), which confuses VoiceOver's visual cursor. */
                setTimeout(function () {
                    var focusable = Array.from(sidebar.querySelectorAll(
                        'a:not([tabindex="-1"]), button:not([tabindex="-1"]), label[tabindex="0"]'
                    )).filter(function (el) { return el.offsetParent !== null; });
                    if (focusable.length) focusable[0].focus();
                }, 280);
            }

            function deactivateTrap() {
                if (trapHandler) {
                    document.removeEventListener('keydown', trapHandler);
                    trapHandler = null;
                }
                setTabindex(false);
                if (dLabel) dLabel.focus();
            }

            if (isMobile()) setTabindex(false);

            drawerCb.addEventListener('change', function () {
                if (isMobile()) { drawerCb.checked ? activateTrap() : deactivateTrap(); }
            });

            window.addEventListener('resize', function () {
                if (!isMobile()) {
                    if (trapHandler) {
                        document.removeEventListener('keydown', trapHandler);
                        trapHandler = null;
                    }
                    sidebar.querySelectorAll('[tabindex="-1"]').forEach(function (el) {
                        el.removeAttribute('tabindex');
                    });
                    sidebar.querySelectorAll('label[data-kb-patched]').forEach(function (l) {
                        l.setAttribute('tabindex', '0');
                    });
                    sidebar.removeAttribute('aria-hidden');
                } else if (!drawerCb.checked) {
                    setTabindex(false);
                }
            });
        }());

        /* WCAG 2.4.1: validate the skip-to-content link on every page.
           On the homepage the generated anchor (#aptrust-documentation) may not
           exist in the rendered DOM — Material absorbs the H1 into the page
           header rather than emitting it with an id in the content area. If the
           target is missing, redirect the skip link to the main content wrapper
           so keyboard and AT users can always bypass navigation. */
        (function () {
            var skipLink = document.querySelector('a.md-skip');
            if (!skipLink) return;
            var anchor = (skipLink.getAttribute('href') || '').replace(/^#/, '');
            if (anchor && !document.getElementById(anchor)) {
                var main = document.querySelector('.md-content__inner');
                if (main) {
                    if (!main.id) main.id = 'main-content';
                    skipLink.setAttribute('href', '#main-content');
                }
            }
        }());

        /* WCAG 4.1.2: the swagger-ui-tag plugin renders iframes without a title,
           making them opaque to screen readers. */
        document.querySelectorAll('iframe.swagger-ui-iframe:not([title])').forEach(function (iframe) {
            iframe.setAttribute('title', 'APTrust Member API Reference');
        });

        document.querySelectorAll('.md-typeset a[href^="http"]').forEach(function (link) {
            /* Skip links that point to this same site */
            if (link.hostname === location.hostname) return;

            /* Open in new tab */
            link.setAttribute('target', '_blank');

            /* Security: ensure rel contains noopener */
            var rel = (link.getAttribute('rel') || '').split(' ').filter(Boolean);
            if (!rel.includes('noopener')) {
                rel.push('noopener');
                link.setAttribute('rel', rel.join(' '));
            }

            /* Accessibility: add screen-reader announcement if not already present */
            if (!link.querySelector('.new-tab-label')) {
                var span = document.createElement('span');
                span.className = 'new-tab-label sr-only';
                span.textContent = ' (opens in new tab)';
                link.appendChild(span);
            }
        });
    });
</script>
{% endblock %}
